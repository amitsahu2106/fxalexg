name: FXAlexG Forex Monitor

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Create trades file if missing
        run: |
          if [ ! -f trades.json ]; then
            echo '{}' > trades.json
            echo "Created fresh trades.json"
          else
            echo "trades.json exists:"
            cat trades.json
          fi

      - name: Run FXAlexG Monitor
        env:
          OANDA_API_KEY:      ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID:   ${{ secrets.OANDA_ACCOUNT_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fxalexg_monitor.py

      - name: Save trades back to repo
        run: |
          git config user.name  "FXAlexG Bot"
          git config user.email "bot@fxalexg.com"
          git add trades.json
          if git diff --staged --quiet; then
            echo "No trade changes to commit"
          else
            git commit -m "Update trades.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
