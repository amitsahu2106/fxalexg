name: FXAlexG Forex Monitor

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Restore trades cache
        uses: actions/cache@v4
        with:
          path: trades.json
          key: trades-cache
          restore-keys: trades-cache

      - name: Create trades file if missing
        run: |
          if [ ! -f trades.json ]; then
            echo '{}' > trades.json
          fi

      - name: Run FXAlexG Monitor
        env:
          OANDA_API_KEY:      ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID:   ${{ secrets.OANDA_ACCOUNT_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python fxalexg_monitor.py

      - name: Save trades cache
        uses: actions/cache@v4
        with:
          path: trades.json
          key: trades-cache
