name: FXAlexG Forex Monitor

on:
schedule:
# Runs every 5 minutes, 24/7
- cron: ‘*/5 * * * *’
workflow_dispatch:   # Allows manual trigger from GitHub app

jobs:
scan:
runs-on: ubuntu-latest
timeout-minutes: 4   # Kill if takes longer than 4 mins


steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install dependencies
    run: pip install requests

  - name: Run FXAlexG Monitor
    env:
      OANDA_API_KEY:      ${{ secrets.OANDA_API_KEY }}
      OANDA_ACCOUNT_ID:   ${{ secrets.OANDA_ACCOUNT_ID }}
      GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
    run: python fxalexg_monitor.py
```
